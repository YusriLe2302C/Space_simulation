version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  engine:
    build:
      context: ./simulation_engine
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file: ./simulation_engine/.env

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/acm
      - PYTHON_ENGINE_URL=http://engine:9000
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongo
      - engine

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

